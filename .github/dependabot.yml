version: 2

multi-ecosystem-groups:
  javascript-dependencies:
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'Europe/Zurich'
    target-branch: 'main'
    labels:
      - 'dependencies'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'deps'
      include: 'scope'
    pull-request-branch-name:
      separator: '-'

updates:
  - package-ecosystem: 'npm'
    directory: '/'
    # Keep eslint/@eslint/js on 9.x for now.
    # Verified on 2026-07-13: eslint-plugin-react@7.37.5, eslint-plugin-jsx-a11y@6.10.2,
    # and eslint-plugin-jest-dom@5.5.0 still publish peer ranges only through ESLint 9.
    # These peer constraints prevent a supported ESLint 10+ upgrade, so defer 10+ updates for both packages.
    multi-ecosystem-group: 'javascript-dependencies'
    patterns:
      - '*'
    rebase-strategy: 'auto'
    versioning-strategy: 'increase-if-necessary'
    ignore:
      # TypeScript 7.0 has no stable programmatic API, and typescript-eslint supports <6.1.
      - dependency-name: 'typescript'
        versions:
          - '>=6.1.0'
      # Dependabot's Bun updater currently treats this npm alias as a registry package.
      # Update it manually in a lockfile-validated PR until upstream alias support lands.
      - dependency-name: '@typescript/native'
      - dependency-name: 'eslint'
        update-types:
          - 'version-update:semver-major'
        versions:
          - '>=10'
      - dependency-name: '@eslint/js'
        update-types:
          - 'version-update:semver-major'
        versions:
          - '>=10'

  - package-ecosystem: 'bun'
    directory: '/'
    multi-ecosystem-group: 'javascript-dependencies'
    patterns:
      - '*'
    rebase-strategy: 'auto'
    versioning-strategy: 'increase-if-necessary'
    # Dependabot's config parser does not support YAML aliases, so this block is intentionally
    # repeated for each ecosystem that participates in the multi-ecosystem group.
    ignore:
      - dependency-name: 'typescript'
        versions:
          - '>=6.1.0'
      - dependency-name: '@typescript/native'
      - dependency-name: 'eslint'
        update-types:
          - 'version-update:semver-major'
        versions:
          - '>=10'
      - dependency-name: '@eslint/js'
        update-types:
          - 'version-update:semver-major'
        versions:
          - '>=10'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:15'
      timezone: 'Europe/Zurich'
    target-branch: 'main'
    open-pull-requests-limit: 2
    rebase-strategy: 'auto'
    labels:
      - 'dependencies'
      - 'github-actions'
    commit-message:
      prefix: 'ci'
      include: 'scope'
    pull-request-branch-name:
      separator: '-'
    groups:
      github-actions:
        patterns:
          - '*'

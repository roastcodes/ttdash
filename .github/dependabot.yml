version: 2

multi-ecosystem-groups:
  javascript-dependencies:
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'Europe/Zurich'
    target-branch: 'main'
    labels:
      - 'dependencies'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'deps'
      include: 'scope'
    pull-request-branch-name:
      separator: '-'

updates:
  - package-ecosystem: 'npm'
    directory: '/'
    # Keep eslint/@eslint/js on 9.x for now.
    # Verified on 2026-04-20: an isolated npm install of eslint@10.2.1 and @eslint/js@10.0.1
    # still fails dependency resolution, and eslint-plugin-react@7.37.5 currently advertises
    # eslint support only through ^9.7.
    multi-ecosystem-group: 'javascript-dependencies'
    patterns:
      - '*'
    rebase-strategy: 'auto'
    versioning-strategy: 'increase-if-necessary'
    ignore:
      - dependency-name: 'eslint'
        update-types:
          - 'version-update:semver-major'
        versions:
          - '>=10'
      - dependency-name: '@eslint/js'
        update-types:
          - 'version-update:semver-major'
        versions:
          - '>=10'

  - package-ecosystem: 'bun'
    directory: '/'
    multi-ecosystem-group: 'javascript-dependencies'
    patterns:
      - '*'
    rebase-strategy: 'auto'
    versioning-strategy: 'increase-if-necessary'
    ignore:
      - dependency-name: 'eslint'
        update-types:
          - 'version-update:semver-major'
        versions:
          - '>=10'
      - dependency-name: '@eslint/js'
        update-types:
          - 'version-update:semver-major'
        versions:
          - '>=10'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:15'
      timezone: 'Europe/Zurich'
    target-branch: 'main'
    open-pull-requests-limit: 2
    rebase-strategy: 'auto'
    labels:
      - 'dependencies'
      - 'github-actions'
    commit-message:
      prefix: 'ci'
      include: 'scope'
    pull-request-branch-name:
      separator: '-'
    groups:
      github-actions:
        patterns:
          - '*'

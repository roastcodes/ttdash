name: Pages

on:
  workflow_call:
  workflow_dispatch:

permissions: {}

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build documentation
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      pages: read

    steps:
      - name: Check out source revision
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs-site/package-lock.json

      - name: Verify exact main commit passed required CI
        if: github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          node scripts/verify-main-ci.js \
            --repo "${{ github.repository }}" \
            --workflow ci.yml \
            --branch main \
            --sha "${{ github.sha }}" \
            --required-job "CI Required" \
            --retries 1

      - name: Install application dependencies
        run: npm ci --ignore-scripts

      - name: Install documentation dependencies
        run: npm run docs:install

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Verify documentation build and publication boundary
        run: npm run docs:verify

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run documentation browser and accessibility tests
        run: npm run test:docs:e2e:built

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs-site/dist

  deploy:
    name: Deploy documentation
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages site
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tagged commit is on main
        run: |
          git fetch origin main --depth=1
          git branch -r --contains HEAD | grep -q 'origin/main'

      - name: Verify tag matches package version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          test "v${VERSION}" = "${GITHUB_REF_NAME}"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run unit and integration tests with coverage
        run: npm run test:unit:coverage

      - name: Build production bundle
        run: npm run build

      - name: Verify packed npm artifact
        run: npm run verify:package

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run end-to-end smoke tests
        run: npm run test:e2e:ci

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Publish package to npm
        run: npm publish

      - name: Wait for npm registry propagation
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          for attempt in 1 2 3 4 5 6; do
            if npm view "@roastcodes/ttdash@${VERSION}" version >/dev/null 2>&1; then
              exit 0
            fi
            sleep 10
          done
          echo "Package was not visible on npm in time."
          exit 1

      - name: Verify registry install paths
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          node scripts/verify-registry-install.js \
            --package @roastcodes/ttdash \
            --version "${VERSION}" \
            --retries 6 \
            --retry-delay-ms 10000

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists. Skipping creation."
            exit 0
          fi

          gh release create "${GITHUB_REF_NAME}" \
            --verify-tag \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version in x.y.z format
        required: true
        type: string

permissions:
  actions: read
  contents: write
  id-token: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    environment: release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RELEASE_VERSION: ${{ inputs.version }}

    steps:
      - name: Create release app token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          # v3 prefers client-id over the deprecated app-id input.
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: write
          repositories: ttdash

      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: main
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Verify release version input
        run: |
          export CURRENT_VERSION="$(node -p "require('./package.json').version")"
          export RELEASE_VERSION
          echo "CURRENT_VERSION=${CURRENT_VERSION}" >> "$GITHUB_ENV"
          node - <<'NODE'
          const current = process.env.CURRENT_VERSION
          const requested = process.env.RELEASE_VERSION
          const semverPattern = /^\d+\.\d+\.\d+$/

          if (!semverPattern.test(requested)) {
            throw new Error(`Release version must use x.y.z format. Received: ${requested}`)
          }

          const parse = (value) => value.split('.').map((part) => Number.parseInt(part, 10))
          const compare = (left, right) => {
            for (let index = 0; index < 3; index += 1) {
              if (left[index] > right[index]) return 1
              if (left[index] < right[index]) return -1
            }
            return 0
          }

          if (compare(parse(requested), parse(current)) < 0) {
            throw new Error(`Release version ${requested} must not be lower than current package version ${current}`)
          }
          NODE
          echo "RELEASE_TAG=v${RELEASE_VERSION}" >> "$GITHUB_ENV"
          if [[ "${RELEASE_VERSION}" = "${CURRENT_VERSION}" ]]; then
            echo "SHOULD_BUMP=false" >> "$GITHUB_ENV"
            echo "Release version already present on main. Continuing in retry mode."
          else
            echo "SHOULD_BUMP=true" >> "$GITHUB_ENV"
          fi

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Verify main CI succeeded
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          MAIN_SHA="$(git rev-parse HEAD)"
          node scripts/verify-main-ci.js \
            --repo "${{ github.repository }}" \
            --workflow ci.yml \
            --branch main \
            --sha "${MAIN_SHA}" \
            --retries 90 \
            --retry-delay-ms 10000

      - name: Configure authenticated remote
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Bump package version
        if: env.SHOULD_BUMP == 'true'
        run: npm version "${RELEASE_VERSION}" --no-git-tag-version

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check formatting
        run: npm run format:check

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript checks
        run: ./node_modules/.bin/tsc --noEmit

      - name: Run unit and integration tests with coverage
        run: npm run test:unit:coverage

      - name: Build production bundle
        run: npm run build:app

      - name: Verify packed npm artifact
        run: npm run verify:package

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run end-to-end smoke tests
        run: npm run test:e2e:ci

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.4

      - name: Load release signing secrets
        id: load-release-secrets
        uses: 1Password/load-secrets-action@dafbe7cb03502b260e2b2893c753c352eee545bf # v3
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN_PUBLIC }}
          RELEASE_SIGNER_NAME: ${{ secrets.OP_SSH_BASE_URL }}name
          RELEASE_SIGNER_EMAIL: ${{ secrets.OP_SSH_BASE_URL }}comment
          RELEASE_SIGNING_PUBLIC_KEY: ${{ secrets.OP_SSH_BASE_URL }}public key
          RELEASE_SIGNING_PRIVATE_KEY: ${{ secrets.OP_SSH_BASE_URL }}private key?ssh-format=openssh

      - name: Write SSH signing key files
        env:
          RELEASE_SIGNING_PRIVATE_KEY: ${{ steps.load-release-secrets.outputs.RELEASE_SIGNING_PRIVATE_KEY }}
          RELEASE_SIGNING_PUBLIC_KEY: ${{ steps.load-release-secrets.outputs.RELEASE_SIGNING_PUBLIC_KEY }}
        run: |
          mkdir -p "${RUNNER_TEMP}/release-signing"
          printf '%s\n' "${RELEASE_SIGNING_PRIVATE_KEY}" > "${RUNNER_TEMP}/release-signing/signing-key"
          printf '%s\n' "${RELEASE_SIGNING_PUBLIC_KEY}" > "${RUNNER_TEMP}/release-signing/signing-key.pub"
          chmod 600 "${RUNNER_TEMP}/release-signing/signing-key"
          chmod 644 "${RUNNER_TEMP}/release-signing/signing-key.pub"

      - name: Configure git identity and SSH signing
        env:
          RELEASE_SIGNER_NAME: ${{ steps.load-release-secrets.outputs.RELEASE_SIGNER_NAME }}
          RELEASE_SIGNER_EMAIL: ${{ steps.load-release-secrets.outputs.RELEASE_SIGNER_EMAIL }}
        run: |
          git config user.name "${RELEASE_SIGNER_NAME}"
          git config user.email "${RELEASE_SIGNER_EMAIL}"
          git config gpg.format ssh
          git config user.signingkey "${RUNNER_TEMP}/release-signing/signing-key.pub"
          git config commit.gpgsign true
          git config tag.gpgSign true

          printf '%s ' "${RELEASE_SIGNER_EMAIL}" > "${RUNNER_TEMP}/release-signing/allowed-signers"
          cat "${RUNNER_TEMP}/release-signing/signing-key.pub" >> "${RUNNER_TEMP}/release-signing/allowed-signers"
          git config gpg.ssh.allowedSignersFile "${RUNNER_TEMP}/release-signing/allowed-signers"

      - name: Verify SSH signing setup
        run: |
          PROBE_TAG="release-signing-probe-${GITHUB_RUN_ID}"
          git tag -s "${PROBE_TAG}" -m "${PROBE_TAG}"
          git tag -v "${PROBE_TAG}"
          git tag -d "${PROBE_TAG}"

      - name: Create signed release commit and tag
        run: |
          git fetch --tags origin
          if [[ "${SHOULD_BUMP}" = "true" ]]; then
            git add package.json package-lock.json
            git commit -S \
              -m "v${RELEASE_VERSION}: Release" \
              -m "on-behalf-of: @roastcodes <github@roast.codes>"
            git log -1 --show-signature
          fi

          if git rev-parse "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Tag ${RELEASE_TAG} already exists locally. Skipping tag creation."
          else
            git tag -s "${RELEASE_TAG}" -m "${RELEASE_TAG}"
            git tag -v "${RELEASE_TAG}"
          fi

      - name: Push release commit and tag
        run: |
          if [[ "${SHOULD_BUMP}" = "true" ]]; then
            git push origin HEAD:main
          fi

          if git ls-remote --tags origin "refs/tags/${RELEASE_TAG}" | grep -q .; then
            echo "Tag ${RELEASE_TAG} already exists on origin. Skipping tag push."
          else
            git push origin "${RELEASE_TAG}"
          fi

      - name: Detect existing npm publication
        run: |
          if npm view "@roastcodes/ttdash@${RELEASE_VERSION}" version >/dev/null 2>&1; then
            echo "NPM_VERSION_EXISTS=true" >> "$GITHUB_ENV"
            echo "Package version already exists on npm. Skipping publish."
          else
            echo "NPM_VERSION_EXISTS=false" >> "$GITHUB_ENV"
          fi

      - name: Publish package to npm
        if: env.NPM_VERSION_EXISTS != 'true'
        run: npm publish

      - name: Wait for npm registry propagation
        run: |
          for attempt in 1 2 3 4 5 6; do
            if npm view "@roastcodes/ttdash@${RELEASE_VERSION}" version >/dev/null 2>&1; then
              exit 0
            fi
            sleep 10
          done
          echo "Package was not visible on npm in time."
          exit 1

      - name: Verify registry install paths
        run: |
          node scripts/verify-registry-install.js \
            --package @roastcodes/ttdash \
            --version "${RELEASE_VERSION}" \
            --retries 6 \
            --retry-delay-ms 10000

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists. Skipping creation."
            exit 0
          fi

          gh release create "${RELEASE_TAG}" \
            --verify-tag \
            --title "${RELEASE_TAG}" \
            --generate-notes

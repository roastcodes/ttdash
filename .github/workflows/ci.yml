name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: Static Checks
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run static checks
        run: npm run test:static

  vitest:
    name: Vitest (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        project:
          - architecture
          - unit
          - frontend
          - integration
          - integration-background

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run Vitest project
        env:
          PROJECT: ${{ matrix.project }}
        run: npm run "test:vitest:${PROJECT}"

      - name: Check Vitest timing budget
        env:
          PROJECT: ${{ matrix.project }}
        run: |
          node scripts/report-test-timings.js \
            "test-results/vitest-${PROJECT}.junit.xml" \
            --max-suite-seconds=20 \
            --max-test-seconds=12

      - name: Upload Vitest report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-reports-vitest-${{ matrix.project }}
          if-no-files-found: ignore
          path: test-results/vitest-${{ matrix.project }}.junit.xml

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run unit and integration tests with coverage
        run: npm run test:vitest:coverage

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-reports
          if-no-files-found: ignore
          path: |
            coverage/
            test-results/vitest-coverage.junit.xml

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build production bundle
        run: npm run build:app

      - name: Upload production bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: production-dist
          if-no-files-found: error
          path: dist/

  package-smoke:
    name: Package Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Download production bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: production-dist
          path: dist

      - name: Verify packed npm artifact
        run: npm run verify:package

  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Download production bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: production-dist
          path: dist

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run end-to-end smoke tests
        run: npm run test:e2e:ci

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-reports-e2e
          if-no-files-found: ignore
          path: |
            playwright-report/
            test-results/

  windows-smoke:
    name: Windows Smoke
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run Windows server helper smoke tests
        run: npx vitest run tests/unit/server-helpers-runner-core.test.ts tests/unit/server-helpers-network.test.ts

      - name: Build production bundle
        run: npm run build:app

      - name: Run TypeScript checks
        run: npm run typecheck

  bun-toolchain:
    name: Bun Toolchain
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Install dependencies with Bun
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Verify TypeScript toolchain
        run: bun run verify:typescript-toolchain

      - name: Run ESLint with the Bun installation
        run: bun run lint

      - name: Run TypeScript checks with the Bun installation
        run: bun run typecheck

      - name: Run architecture tests with the Bun installation
        run: bun run test:architecture

      - name: Build with the Bun installation
        run: bun run build:app

  ci-required:
    name: CI Required
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - static
      - vitest
      - coverage
      - build
      - package-smoke
      - e2e
      - windows-smoke
      - bun-toolchain
    if: ${{ always() }}

    steps:
      - name: Verify required CI jobs
        env:
          STATIC_RESULT: ${{ needs.static.result }}
          VITEST_RESULT: ${{ needs.vitest.result }}
          COVERAGE_RESULT: ${{ needs.coverage.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          PACKAGE_SMOKE_RESULT: ${{ needs['package-smoke'].result }}
          E2E_RESULT: ${{ needs.e2e.result }}
          WINDOWS_SMOKE_RESULT: ${{ needs['windows-smoke'].result }}
          BUN_TOOLCHAIN_RESULT: ${{ needs['bun-toolchain'].result }}
        run: |
          failed=0

          check_result() {
            local job_name="$1"
            local result="$2"

            if [[ "${result}" = "success" ]]; then
              echo "${job_name}: ${result}"
            else
              echo "::error::${job_name}: ${result}"
              failed=1
            fi
          }

          check_result "static" "${STATIC_RESULT}"
          check_result "vitest" "${VITEST_RESULT}"
          check_result "coverage" "${COVERAGE_RESULT}"
          check_result "build" "${BUILD_RESULT}"
          check_result "package-smoke" "${PACKAGE_SMOKE_RESULT}"
          check_result "e2e" "${E2E_RESULT}"
          check_result "windows-smoke" "${WINDOWS_SMOKE_RESULT}"
          check_result "bun-toolchain" "${BUN_TOOLCHAIN_RESULT}"

          exit "${failed}"

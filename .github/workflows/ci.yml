name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  # Keep a production deployment running once a main build reaches the Pages job.
  # Superseded pull-request runs can still be cancelled immediately.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  static:
    name: Static Checks
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run static checks
        run: npm run test:static

  vitest:
    name: Vitest (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        project:
          - architecture
          - unit
          - frontend
          - integration
          - integration-background

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run Vitest project
        env:
          PROJECT: ${{ matrix.project }}
        run: npm run "test:vitest:${PROJECT}"

      - name: Check Vitest timing budget
        env:
          PROJECT: ${{ matrix.project }}
        run: |
          node scripts/report-test-timings.js \
            "test-results/vitest-${PROJECT}.junit.xml" \
            --max-suite-seconds=20 \
            --max-test-seconds=12

      - name: Upload Vitest report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-reports-vitest-${{ matrix.project }}
          if-no-files-found: ignore
          path: test-results/vitest-${{ matrix.project }}.junit.xml

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run unit and integration tests with coverage
        run: npm run test:vitest:coverage

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-reports
          if-no-files-found: ignore
          path: |
            coverage/
            test-results/vitest-coverage.junit.xml

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build production bundle
        run: npm run build:app

      - name: Pack npm artifact
        run: |
          mkdir -p package-artifact
          npm pack --json --ignore-scripts --pack-destination package-artifact

      - name: Upload production bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: production-dist
          if-no-files-found: error
          path: dist/

      - name: Upload packed npm artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: production-package
          if-no-files-found: error
          path: package-artifact/*.tgz

  package-smoke:
    name: Package Smoke (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 24]

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Download packed npm artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: production-package
          path: package-artifact

      - name: Verify packed npm artifact
        run: npm run verify:package -- --tarball-dir package-artifact

  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Download production bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: production-dist
          path: dist

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run end-to-end smoke tests
        run: npm run test:e2e:ci

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-reports-e2e
          if-no-files-found: ignore
          path: |
            playwright-report/
            test-results/

  docker-smoke:
    name: Docker Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Build and test the Docker image
        run: npm run test:docker

  windows-smoke:
    name: Windows Smoke
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run Windows server helper smoke tests
        run: npx vitest run tests/unit/server-helpers-runner-core.test.ts tests/unit/server-helpers-network.test.ts

      - name: Build production bundle
        run: npm run build:app

      - name: Run TypeScript checks
        run: npm run typecheck

  bun-toolchain:
    name: Bun Toolchain
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Install dependencies with Bun
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Verify TypeScript toolchain
        run: bun run verify:typescript-toolchain

      - name: Run ESLint with the Bun installation
        run: bun run lint

      - name: Run TypeScript checks with the Bun installation
        run: bun run typecheck

      - name: Run architecture tests with the Bun installation
        run: bun run test:architecture

      - name: Build with the Bun installation
        run: bun run build:app

  documentation:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs-site/package-lock.json

      - name: Install application dependencies
        run: npm ci --ignore-scripts

      - name: Install documentation dependencies
        run: npm run docs:install

      - name: Verify documentation build and publication boundary
        run: npm run docs:verify

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run documentation browser and accessibility tests
        run: npm run test:docs:e2e:built

      - name: Upload verified documentation site
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: documentation-site
          if-no-files-found: error
          retention-days: 7
          path: docs-site/dist/

      - name: Upload documentation test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: documentation-test-reports
          if-no-files-found: ignore
          retention-days: 7
          path: |
            playwright-docs-report/
            test-results/

  ci-required:
    name: CI Required
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - static
      - vitest
      - coverage
      - build
      - package-smoke
      - e2e
      - docker-smoke
      - windows-smoke
      - bun-toolchain
      - documentation
    if: ${{ always() }}

    steps:
      - name: Verify required CI jobs
        env:
          STATIC_RESULT: ${{ needs.static.result }}
          VITEST_RESULT: ${{ needs.vitest.result }}
          COVERAGE_RESULT: ${{ needs.coverage.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          PACKAGE_SMOKE_RESULT: ${{ needs['package-smoke'].result }}
          E2E_RESULT: ${{ needs.e2e.result }}
          DOCKER_SMOKE_RESULT: ${{ needs['docker-smoke'].result }}
          WINDOWS_SMOKE_RESULT: ${{ needs['windows-smoke'].result }}
          BUN_TOOLCHAIN_RESULT: ${{ needs['bun-toolchain'].result }}
          DOCUMENTATION_RESULT: ${{ needs.documentation.result }}
        run: |
          failed=0

          check_result() {
            local job_name="$1"
            local result="$2"

            if [[ "${result}" = "success" ]]; then
              echo "${job_name}: ${result}"
            else
              echo "::error::${job_name}: ${result}"
              failed=1
            fi
          }

          check_result "static" "${STATIC_RESULT}"
          check_result "vitest" "${VITEST_RESULT}"
          check_result "coverage" "${COVERAGE_RESULT}"
          check_result "build" "${BUILD_RESULT}"
          check_result "package-smoke" "${PACKAGE_SMOKE_RESULT}"
          check_result "e2e" "${E2E_RESULT}"
          check_result "docker-smoke" "${DOCKER_SMOKE_RESULT}"
          check_result "windows-smoke" "${WINDOWS_SMOKE_RESULT}"
          check_result "bun-toolchain" "${BUN_TOOLCHAIN_RESULT}"
          check_result "documentation" "${DOCUMENTATION_RESULT}"

          exit "${failed}"

  publish-documentation:
    name: Publish Documentation
    needs: ci-required
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.ci-required.result == 'success'
    permissions:
      actions: read
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/pages.yml

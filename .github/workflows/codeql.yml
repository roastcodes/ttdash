name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  # Dependabot needs pull_request_target to upload CodeQL results with write access.
  # The job-level guard below restricts this elevated event to Dependabot PRs only.
  pull_request_target:
    branches:
      - main
  schedule:
    - cron: '41 5 * * 1'

permissions:
  security-events: write
  packages: read
  actions: read
  contents: read

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 360

    if: >-
      github.event_name != 'pull_request_target' ||
      (
        github.actor == 'dependabot[bot]' &&
        github.event.pull_request.user.login == 'dependabot[bot]'
      )

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: actions
            build-mode: none

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4.37.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4.37.2
        with:
          category: '/language:${{ matrix.language }}'
